<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Röchling — Portal de Sistemas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231563AE'/><circle cx='17' cy='33' r='5.5' fill='white'/><circle cx='32' cy='22' r='7' fill='white'/><circle cx='47' cy='33' r='5.5' fill='white'/></svg>">
<style>
  :root{
    --blue:        #1563AE;
    --blue-deep:   #0C3F73;
    --blue-soft:   #E3EEF9;
    --bg:          #F4F7FB;
    --surface:     #FFFFFF;
    --text:        #14283C;
    --muted:       #5A6B7E;
    --line:        #DCE5EF;
    --accent:      #1563AE;
    --shadow:      0 2px 6px rgba(12,63,115,.06), 0 12px 32px rgba(12,63,115,.08);
    --shadow-hover:0 4px 12px rgba(12,63,115,.10), 0 20px 48px rgba(12,63,115,.14);
  }
  html[data-theme="dark"]{
    --blue:        #4D9BE8;
    --blue-deep:   #0C3F73;
    --blue-soft:   #143255;
    --bg:          #0B1826;
    --surface:     #122740;
    --text:        #E8EEF5;
    --muted:       #8FA3B8;
    --line:        #1E3A5C;
    --accent:      #4D9BE8;
    --shadow:      0 2px 6px rgba(0,0,0,.25), 0 12px 32px rgba(0,0,0,.30);
    --shadow-hover:0 4px 12px rgba(0,0,0,.30), 0 20px 48px rgba(0,0,0,.40);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ height:100%; }
  body{
    font-family:'Inter', system-ui, sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;            /* fallback */
    height:100dvh;           /* altura real da janela */
    overflow:hidden;         /* sem rolagem de página */
    display:flex; flex-direction:column;
    transition: background .35s ease, color .35s ease;
  }
  a{ color:inherit; }

  /* ===== Header (compacto) ===== */
  header{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:clamp(10px,1.8vh,16px) clamp(20px,4vw,48px);
    border-bottom:1px solid var(--line);
    transition: border-color .35s ease;
  }
  /* Logo JPG: no tema claro, multiply "apaga" o fundo branco;
     no escuro, o logo vira branco e o fundo preto some com screen */
  .logo{
    height:clamp(24px,3.4vh,30px); width:auto; display:block;
    mix-blend-mode:multiply;
    transition:filter .35s ease;
  }
  html[data-theme="dark"] .logo{
    filter:brightness(0) invert(1);
    mix-blend-mode:screen;
  }

  .theme-toggle{
    display:flex; align-items:center; gap:7px;
    background:var(--surface); color:var(--muted);
    border:1px solid var(--line); border-radius:999px;
    padding:6px 12px; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:12.5px; font-weight:500;
    transition: all .25s ease;
  }
  .theme-toggle:hover{ color:var(--accent); border-color:var(--accent); }
  .theme-toggle:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .theme-toggle svg{ width:15px; height:15px; }
  .theme-toggle .icon-sun{ display:none; }
  html[data-theme="dark"] .theme-toggle .icon-sun{ display:block; }
  html[data-theme="dark"] .theme-toggle .icon-moon{ display:none; }

  /* ===== Hero (compacto, escala com a altura da tela) ===== */
  .hero{
    flex:0 0 auto;
    text-align:center;
    padding:clamp(14px,3.5vh,36px) 24px clamp(10px,2.5vh,24px);
  }
  .dot-arc{
    display:flex; justify-content:center; align-items:flex-end; gap:11px;
    margin-bottom:clamp(8px,1.6vh,16px); height:20px;
  }
  .dot-arc span{
    width:9px; height:9px; border-radius:50%;
    background:var(--accent);
    opacity:0; transform:translateY(8px);
    animation:dot-in .5s ease forwards;
  }
  .dot-arc span:nth-child(2){ width:12px; height:12px; margin-bottom:7px; animation-delay:.15s; }
  .dot-arc span:nth-child(3){ animation-delay:.3s; }
  @keyframes dot-in{ to{ opacity:1; transform:translateY(0);} }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px; font-weight:500; letter-spacing:.18em;
    text-transform:uppercase; color:var(--accent);
    margin-bottom:clamp(6px,1.2vh,12px);
  }
  h1{
    font-family:'Sora', sans-serif;
    font-size:clamp(22px,3.6vh,36px); font-weight:700;
    letter-spacing:-.02em; line-height:1.12;
  }
  .hero p{
    margin-top:clamp(6px,1.4vh,12px);
    font-size:clamp(13px,1.7vh,15px);
    color:var(--muted); max-width:520px; margin-left:auto; margin-right:auto;
    line-height:1.5;
  }

  /* ===== Área de sistemas (flexbox: linha incompleta fica centralizada) ===== */
  .grid{
    flex:1 1 auto; min-height:0;
    display:flex; flex-wrap:wrap;
    justify-content:center;
    align-content:center;
    gap:clamp(12px,2vh,20px);
    padding:0 clamp(20px,4vw,48px) clamp(10px,2vh,20px);
    width:100%; max-width:1400px; margin:0 auto;
    overflow-y:auto;   /* fallback: se realmente não couber (celular), rola só esta área */
  }
  .card{
    position:relative;
    flex:0 1 320px; min-width:260px;
    display:flex; flex-direction:column; gap:clamp(7px,1.2vh,12px);
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:clamp(14px,2.4vh,22px) clamp(16px,1.6vw,22px);
    text-decoration:none;
    box-shadow:var(--shadow);
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease,
                background .35s ease;
    overflow:hidden;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow-hover);
    border-color:var(--accent);
  }
  .card:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }

  .card .mini-arc{
    position:absolute; top:16px; right:18px;
    display:flex; align-items:flex-end; gap:5px;
  }
  .card .mini-arc i{
    width:5px; height:5px; border-radius:50%;
    background:var(--line);
    transition:background .25s ease, transform .25s ease;
  }
  .card .mini-arc i:nth-child(2){ width:6px; height:6px; margin-bottom:4px; }
  .card:hover .mini-arc i{ background:var(--accent); }
  .card:hover .mini-arc i:nth-child(1){ transition-delay:0s; }
  .card:hover .mini-arc i:nth-child(2){ transition-delay:.07s; }
  .card:hover .mini-arc i:nth-child(3){ transition-delay:.14s; }

  .card-icon{
    width:clamp(38px,5.5vh,46px); height:clamp(38px,5.5vh,46px);
    border-radius:12px;
    background:var(--blue-soft); color:var(--blue);
    display:flex; align-items:center; justify-content:center;
    transition:background .35s ease, color .35s ease;
  }
  .card-icon svg{ width:55%; height:55%; }

  .card-head{ display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; }
  .card h2{
    font-family:'Sora', sans-serif;
    font-size:clamp(16px,2.2vh,19px); font-weight:600; letter-spacing:-.01em;
  }
  .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px; font-weight:500;
    color:var(--accent);
    border:1px solid var(--line);
    border-radius:6px; padding:2px 6px;
  }
  .card .desc{
    font-size:clamp(12.5px,1.7vh,13.5px); line-height:1.5; color:var(--muted);
    flex-grow:1;
    display:-webkit-box;
    -webkit-line-clamp:3;      /* limita a 3 linhas para altura previsível */
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card .open{
    display:flex; align-items:center; gap:6px;
    font-size:13px; font-weight:600; color:var(--accent);
  }
  .card .open svg{ width:14px; height:14px; transition:transform .25s ease; }
  .card:hover .open svg{ transform:translate(2px,-2px); }

  /* ===== Footer (compacto) ===== */
  footer{
    flex:0 0 auto;
    text-align:center;
    padding:clamp(8px,1.6vh,14px) 24px;
    border-top:1px solid var(--line);
    font-size:11.5px; color:var(--muted);
    transition:border-color .35s ease;
  }
  footer b{ color:var(--text); font-weight:600; }

  /* Telas baixas (notebooks pequenos, janela reduzida): enxuga o hero */
  @media (max-height:620px){
    .hero p{ display:none; }
    .dot-arc{ display:none; }
    .hero{ padding-top:12px; padding-bottom:8px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    .dot-arc span{ opacity:1; transform:none; }
  }
  @media (max-width:640px){
    .grid{ align-content:flex-start; }
    .card{ flex-basis:100%; }
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="Roechling_Logo_RGB.jpg" alt="Röchling">
  <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema claro/escuro">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <span id="themeLabel">Escuro</span>
  </button>
</header>

<section class="hero">
  <div class="dot-arc" aria-hidden="true"><span></span><span></span><span></span></div>
  <div class="eyebrow">Röchling · Sistemas Industriais</div>
  <h1>Portal de Sistemas</h1>
  <p>Acesso centralizado às ferramentas de gestão da produção e da qualidade. Selecione um sistema para abrir.</p>
</section>

<main class="grid" id="grid" aria-label="Sistemas disponíveis"></main>

<footer>
  <b>Röchling</b> · Portal interno de sistemas · Os sistemas abrem em uma nova aba
</footer>

<script>
/* =====================================================================
   SISTEMAS — para adicionar um novo sistema no futuro, basta incluir
   um novo objeto neste array. Nada mais precisa ser alterado.
   - nome : título exibido no card
   - tag  : etiqueta curta (área / versão)
   - desc : descrição resumida
   - url  : endereço do sistema (abre em nova aba)
   - icone: 'refugo' | 'programacao' | 'plano' | 'grafico' | 'engrenagem'
   ===================================================================== */
const SISTEMAS = [
  {
    nome : "ScrapIQ",
    tag  : "Qualidade",
    desc : "Gestão de refugo industrial — índice e custo de scrap, Pareto de defeitos e produtos, análise por equipamento e turno, com sincronização em nuvem.",
    url  : "https://acecchini-jpg.github.io/ScrapIQ/",
    icone: "refugo"
  },
  {
    nome : "Dash SF",
    tag  : "Produção",
    desc : "Dashboard de programação diária — aderência ao plano (total, acabado e WIP), downtime e Pareto de motivos de parada por produto, máquina e molde.",
    url  : "https://acecchini-jpg.github.io/DashSF/",
    icone: "programacao"
  },
  {
    nome : "Dash PDM",
    tag  : "Indicadores",
    desc : "PDM KPI Tracking — dashboard executivo de indicadores por área, entrada diária de dados, Gemba Walk, relatório semanal de gestão à vista e importação de Excel.",
    url  : "https://acecchini-jpg.github.io/DashPDM/",
    icone: "grafico"
  },
  {
    nome : "Action Plan",
    tag  : "Em breve",
    desc : "Gestão de planos de ação — abertura, acompanhamento e encerramento de ações corretivas por responsável e prazo. Sistema em desenvolvimento.",
    url  : "em-construcao.html",
    icone: "plano"
  }
];

/* Ícones em SVG inline (stroke = currentColor) */
const ICONES = {
  refugo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><rect x="5" y="12" width="3.5" height="9" rx="1"/><rect x="10.5" y="7" width="3.5" height="14" rx="1"/><rect x="16" y="10" width="3.5" height="11" rx="1"/><path d="M5 8l4-4 3.5 2.5L17 3"/><path d="M17 3h3v3"/></svg>',
  programacao: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><path d="M7.5 14.5l2.5 2.5 5-5"/></svg>',
  plano: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M8.5 11l1.5 1.5 3-3"/><line x1="8.5" y1="16.5" x2="15.5" y2="16.5"/></svg>',
  grafico: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>',
  engrenagem: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.08a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
};

/* ===== Renderização dos cards ===== */
(function renderCards(){
  const grid = document.getElementById('grid');
  grid.innerHTML = SISTEMAS.map(s => (
    '<a class="card" href="' + s.url + '" target="_blank" rel="noopener noreferrer">' +
      '<span class="mini-arc" aria-hidden="true"><i></i><i></i><i></i></span>' +
      '<span class="card-icon">' + (ICONES[s.icone] || ICONES.grafico) + '</span>' +
      '<span class="card-head"><h2>' + s.nome + '</h2><span class="tag">' + s.tag + '</span></span>' +
      '<span class="desc">' + s.desc + '</span>' +
      '<span class="open">Abrir sistema' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M8 7h9v9"/></svg>' +
      '</span>' +
    '</a>'
  )).join('');
})();

/* ===== Tema claro / escuro =====
   Ordem de prioridade: escolha salva > preferência do sistema > claro */
(function initTheme(){
  const root   = document.documentElement;
  const btn    = document.getElementById('themeToggle');
  const label  = document.getElementById('themeLabel');

  function lerSalvo(){
    try { return localStorage.getItem('portal-tema'); } catch(e){ return null; }
  }
  function salvar(t){
    try { localStorage.setItem('portal-tema', t); } catch(e){ /* modo restrito: segue sem persistir */ }
  }
  function aplicar(t){
    root.setAttribute('data-theme', t);
    label.textContent = (t === 'dark') ? 'Claro' : 'Escuro';
  }

  const salvo = lerSalvo();
  const preferido = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  aplicar(salvo || preferido);

  btn.addEventListener('click', function(){
    const novo = (root.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
    aplicar(novo);
    salvar(novo);
  });
})();
</script>
</body>
</html>
