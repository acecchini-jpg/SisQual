<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Plan — Em construção</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:      #1563AE;
    --blue-soft: #E3EEF9;
    --bg:        #F4F7FB;
    --surface:   #FFFFFF;
    --text:      #14283C;
    --muted:     #5A6B7E;
    --line:      #DCE5EF;
    --accent:    #1563AE;
    --grid-line: rgba(21,99,174,.07);
  }
  html[data-theme="dark"]{
    --blue:      #4D9BE8;
    --blue-soft: #143255;
    --bg:        #0B1826;
    --surface:   #122740;
    --text:      #E8EEF5;
    --muted:     #8FA3B8;
    --line:      #1E3A5C;
    --accent:    #4D9BE8;
    --grid-line: rgba(77,155,232,.08);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:'Inter', system-ui, sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:32px 20px; position:relative; overflow:hidden;
    transition:background .35s ease, color .35s ease;
  }

  /* Fundo estilo "planta baixa" (blueprint) */
  body::before{
    content:""; position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:44px 44px;
    animation:grid-drift 40s linear infinite;
  }
  @keyframes grid-drift{ to{ background-position:44px 44px; } }

  .theme-toggle{
    position:fixed; top:22px; right:22px; z-index:2;
    display:flex; align-items:center; gap:8px;
    background:var(--surface); color:var(--muted);
    border:1px solid var(--line); border-radius:999px;
    padding:8px 14px; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
    transition:all .25s ease;
  }
  .theme-toggle:hover{ color:var(--accent); border-color:var(--accent); }
  .theme-toggle:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .stage{ position:relative; z-index:1; text-align:center; max-width:560px; }

  /* Arco de três pontos da Röchling — pulsando */
  .dot-arc{
    display:flex; justify-content:center; align-items:flex-end; gap:16px;
    height:30px; margin-bottom:30px;
  }
  .dot-arc span{
    width:13px; height:13px; border-radius:50%;
    background:var(--accent);
    animation:pulse 1.6s ease-in-out infinite;
  }
  .dot-arc span:nth-child(2){ width:17px; height:17px; margin-bottom:10px; animation-delay:.2s; }
  .dot-arc span:nth-child(3){ animation-delay:.4s; }
  @keyframes pulse{
    0%,100%{ transform:scale(1);   opacity:1;  }
    50%    { transform:scale(.55); opacity:.45;}
  }

  /* Engrenagens girando */
  .gears{ display:flex; justify-content:center; align-items:center; margin-bottom:26px; color:var(--accent); }
  .gears svg{ display:block; }
  .gear-a{ width:74px; height:74px; animation:spin 9s linear infinite; }
  .gear-b{ width:48px; height:48px; margin-left:-10px; margin-top:44px;
           animation:spin 9s linear infinite reverse; opacity:.65; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px; font-weight:500; letter-spacing:.18em;
    text-transform:uppercase; color:var(--accent); margin-bottom:12px;
  }
  h1{
    font-family:'Sora', sans-serif;
    font-size:clamp(30px,6vw,46px); font-weight:700;
    letter-spacing:-.02em; line-height:1.12;
  }
  .sub{
    margin-top:14px; font-size:clamp(15px,1.6vw,17px);
    color:var(--muted); line-height:1.6;
  }
  .sub .dots::after{
    content:''; display:inline-block; width:0; text-align:left;
    animation:ellipsis 1.8s steps(4) infinite;
  }
  @keyframes ellipsis{
    0%  { content:''; }  25% { content:'.'; }
    50% { content:'..'; } 75% { content:'...'; }
  }

  /* Barra de progresso listrada, indeterminada */
  .progress{
    margin:32px auto 0; max-width:380px; height:12px;
    border-radius:999px; border:1px solid var(--line);
    background:var(--surface); overflow:hidden;
  }
  .progress .bar{
    height:100%; width:100%; border-radius:999px;
    background:repeating-linear-gradient(
      -55deg,
      var(--accent) 0 14px,
      color-mix(in srgb, var(--accent) 55%, var(--surface)) 14px 28px
    );
    background-size:200% 100%;
    animation:stripes 1.2s linear infinite;
    opacity:.9;
  }
  @keyframes stripes{ to{ background-position:-40px 0; } }

  .status{
    margin-top:12px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--muted); letter-spacing:.06em;
  }

  .back{
    display:inline-flex; align-items:center; gap:8px;
    margin-top:38px; padding:12px 22px;
    background:var(--accent); color:#fff;
    border-radius:12px; text-decoration:none;
    font-size:14.5px; font-weight:600;
    box-shadow:0 8px 24px rgba(21,99,174,.28);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .back:hover{ transform:translateY(-2px); box-shadow:0 12px 32px rgba(21,99,174,.38); }
  .back:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
  .back svg{ width:16px; height:16px; }

  footer{
    position:fixed; bottom:18px; left:0; right:0; z-index:1;
    text-align:center; font-size:12px; color:var(--muted);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Alternar tema claro/escuro">
  <span id="themeLabel">Escuro</span>
</button>

<div class="stage">
  <div class="dot-arc" aria-hidden="true"><span></span><span></span><span></span></div>

  <div class="gears" aria-hidden="true">
    <svg class="gear-a" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.08a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <svg class="gear-b" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.08a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </div>

  <div class="eyebrow">Röchling · Sistemas Industriais</div>
  <h1>Action Plan</h1>
  <p class="sub">Sistema em construção<span class="dots"></span><br>
     Em breve: gestão completa de planos de ação corretiva.</p>

  <div class="progress" role="progressbar" aria-label="Desenvolvimento em andamento">
    <div class="bar"></div>
  </div>
  <div class="status">STATUS: EM DESENVOLVIMENTO</div>

  <a class="back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    Voltar ao portal
  </a>
</div>

<footer>Röchling · Portal interno de sistemas</footer>

<script>
(function initTheme(){
  const root  = document.documentElement;
  const btn   = document.getElementById('themeToggle');
  const label = document.getElementById('themeLabel');

  function lerSalvo(){
    try { return localStorage.getItem('portal-tema'); } catch(e){ return null; }
  }
  function salvar(t){
    try { localStorage.setItem('portal-tema', t); } catch(e){ /* segue sem persistir */ }
  }
  function aplicar(t){
    root.setAttribute('data-theme', t);
    label.textContent = (t === 'dark') ? 'Claro' : 'Escuro';
  }

  const salvo = lerSalvo();
  const preferido = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  aplicar(salvo || preferido);

  btn.addEventListener('click', function(){
    const novo = (root.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
    aplicar(novo);
    salvar(novo);
  });
})();
</script>
</body>
</html>
